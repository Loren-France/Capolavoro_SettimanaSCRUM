<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente HR Morato Pane</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    /* Morato Pane Color Palette - Tonalità Autunnali */
    --primary: #D2691E; /* Cioccolato/arancione scuro */
    --primary-light: #E68A2E; /* Arancione dorato */
    --primary-dark: #8B4513; /* Marrone scuro */
    --secondary: #F4A460; /* Sabbia chiara */
    --accent: #CD853F; /* Arancione peru */
    --light: #FFF8DC; /* Bianco corno */
    --dark: #2C1810; /* Marrone cioccolato fondente */
    --gray: #A0522D; /* Marrone terra */
    --gradient: linear-gradient(135deg, var(--primary), var(--primary-light));
    --gradient-secondary: linear-gradient(135deg, var(--accent), var(--secondary));
    --gradient-light: linear-gradient(135deg, var(--light), #FFE4B5);
    --gradient-gold: linear-gradient(135deg, #FFD700, #FFA500);
    --shadow: 0 15px 40px rgba(210, 105, 30, 0.25);
    --shadow-light: 0 10px 30px rgba(244, 164, 96, 0.2);
    --shadow-heavy: 0 25px 60px rgba(139, 69, 19, 0.3);
    --radius: 20px;
    --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 🌟 Reset e body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--light);
    color: var(--dark);
    line-height: 1.7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    background-image: 
        radial-gradient(circle at 15% 50%, rgba(244, 164, 96, 0.1) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(210, 105, 30, 0.08) 0%, transparent 25%);
    position: relative;
    overflow: hidden;
}

/* 🟧 Container principale */
.chat-container {
    width: 550px;
    max-width: 95%;
    background: var(--light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-heavy);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(210, 105, 30, 0.15);
    position: relative;
    z-index: 10;
}

/* 🎨 Header con effetto gradient */
.header {
    background: var(--gradient);
    color: var(--light);
    padding: 22px 20px;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 1.5rem;
    text-align: center;
    position: relative;
    letter-spacing: 0.5px;
    box-shadow: 0 5px 15px rgba(139, 69, 19, 0.2);
}

.header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--gradient-secondary);
    animation: linePulse 2s infinite;
}

@keyframes linePulse {
    0%, 100% { width: 100%; }
    50% { width: calc(100% - 40px); margin-left: 20px; }
}

.header small {
    display: block;
    font-family: 'Poppins', sans-serif;
    font-size: 0.85rem;
    opacity: 0.9;
    margin-top: 6px;
    font-weight: 400;
    letter-spacing: 0.5px;
}

/* 📜 Area messaggi */
.messages {
    flex: 1;
    padding: 25px 20px;
    overflow-y: auto;
    background: var(--light);
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 400px;
    max-height: 500px;
    position: relative;
}

/* 💬 Stile bolle chat */
.message {
    max-width: 78%;
    padding: 16px 20px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.6;
    position: relative;
    word-wrap: break-word;
    animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    opacity: 0;
    transform: translateY(20px);
    box-shadow: var(--shadow-light);
    border: 1px solid rgba(210, 105, 30, 0.1);
}

.message.user {
    background: var(--gradient);
    color: var(--light);
    align-self: flex-end;
    border-bottom-right-radius: 8px;
    border-top-left-radius: var(--radius);
    margin-left: 20%;
    position: relative;
}

.message.user::before {
    content: '';
    position: absolute;
    bottom: -1px;
    right: -10px;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 12px solid var(--primary);
    transform: rotate(45deg);
    z-index: -1;
}

.message.bot {
    background: rgba(255, 255, 255, 0.95);
    color: var(--dark);
    align-self: flex-start;
    border-bottom-left-radius: 8px;
    border-top-right-radius: var(--radius);
    margin-right: 20%;
    position: relative;
}

.message.bot::before {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -10px;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 12px solid var(--secondary);
    transform: rotate(-45deg);
    z-index: -1;
}

/* 🖊 Input area */
.input-area {
    display: flex;
    border-top: 1px solid rgba(210, 105, 30, 0.15);
    background: rgba(255, 248, 220, 0.8);
    padding: 15px 20px;
    backdrop-filter: blur(10px);
    position: relative;
}

.input-area::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--gradient-light);
    opacity: 0.5;
}

.input-area input {
    flex: 1;
    border: none;
    padding: 16px 20px;
    font-size: 15px;
    outline: none;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50px;
    border: 2px solid rgba(210, 105, 30, 0.2);
    font-family: 'Poppins', sans-serif;
    transition: var(--transition);
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.05);
}

.input-area input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(210, 105, 30, 0.1);
    background: white;
}

.input-area button {
    border: none;
    background: var(--gradient);
    color: var(--light);
    padding: 0 28px;
    margin-left: 12px;
    font-weight: 700;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: var(--transition);
    border-radius: 50px;
    font-size: 15px;
    letter-spacing: 0.5px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 8px;
}

.input-area button:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(210, 105, 30, 0.3);
    animation: pulse 2s infinite;
}

.input-area button:active {
    transform: translateY(-1px);
}

@keyframes pulse {
    0% { box-shadow: 0 20px 40px rgba(210, 105, 30, 0.3); }
    50% { box-shadow: 0 20px 40px rgba(210, 105, 30, 0.5), 0 0 20px rgba(244, 164, 96, 0.4); }
    100% { box-shadow: 0 20px 40px rgba(210, 105, 30, 0.3); }
}

.input-area button i {
    font-size: 1.1rem;
    transition: var(--transition);
}

.input-area button:hover i {
    transform: translateX(5px);
}

.input-area button::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--gradient-secondary);
    z-index: -1;
    opacity: 0;
    transition: var(--transition);
}

.input-area button:hover::before {
    opacity: 1;
}

/* 🔽 Select modello */
.model-select {
    margin: 15px 20px 0;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 50px;
    border: 2px solid rgba(210, 105, 30, 0.3);
    outline: none;
    background: rgba(255, 255, 255, 0.9);
    font-family: 'Poppins', sans-serif;
    color: var(--dark);
    transition: var(--transition);
    display: none; /* Nascosto per ora */
}

.model-select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(210, 105, 30, 0.1);
}

/* 🎉 Animazioni */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.95);}
    to { opacity: 1; transform: translateY(0) scale(1);}
}

@keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
}

/* 🖱 Scrollbar personalizzata */
.messages::-webkit-scrollbar {
    width: 10px;
}

.messages::-webkit-scrollbar-track {
    background: rgba(244, 164, 96, 0.1);
    border-radius: 10px;
}

.messages::-webkit-scrollbar-thumb {
    background: var(--gradient);
    border-radius: 10px;
    border: 2px solid var(--light);
}

.messages::-webkit-scrollbar-thumb:hover {
    background: var(--gradient-secondary);
}

/* 🏠 Home Button */
.home-button-wrapper {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
}

.home-button {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--gradient);
    color: var(--light);
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 50px;
    font-weight: 700;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    box-shadow: var(--shadow);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}

.home-button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 25px 50px rgba(210, 105, 30, 0.3);
}

.home-button:active {
    transform: translateY(-2px);
}

.home-button i {
    font-size: 1.1rem;
    transition: var(--transition);
}

.home-button:hover i {
    transform: rotate(360deg);
}

.home-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--gradient-secondary);
    z-index: -1;
    opacity: 0;
    transition: var(--transition);
}

.home-button:hover::before {
    opacity: 1;
}

/* Decorazioni autunnali */
.autumn-leaves {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
}

.leaf {
    position: absolute;
    width: 30px;
    height: 30px;
    background: var(--primary);
    clip-path: polygon(50% 0%, 83% 12%, 100% 43%, 94% 78%, 68% 100%, 32% 100%, 6% 78%, 0% 43%, 17% 12%);
    opacity: 0.3;
    animation: falling 20s linear infinite;
    filter: drop-shadow(0 5px 10px rgba(139, 69, 19, 0.2));
}

.leaf:nth-child(1) {
    top: -50px;
    left: 10%;
    animation-delay: 0s;
    background: var(--primary);
    width: 25px;
    height: 25px;
    animation-duration: 22s;
}

.leaf:nth-child(2) {
    top: -50px;
    left: 30%;
    animation-delay: 4s;
    background: var(--primary-light);
    width: 35px;
    height: 35px;
    animation-duration: 25s;
}

.leaf:nth-child(3) {
    top: -50px;
    left: 50%;
    animation-delay: 8s;
    background: var(--accent);
    width: 20px;
    height: 20px;
    animation-duration: 18s;
}

.leaf:nth-child(4) {
    top: -50px;
    left: 70%;
    animation-delay: 12s;
    background: var(--primary-dark);
    width: 30px;
    height: 30px;
    animation-duration: 24s;
}

.leaf:nth-child(5) {
    top: -50px;
    left: 90%;
    animation-delay: 16s;
    background: var(--secondary);
    width: 28px;
    height: 28px;
    animation-duration: 20s;
}

@keyframes falling {
    0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 0.4;
    }
    90% {
        opacity: 0.4;
    }
    100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

/* Glowing Effects */
.glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210, 105, 30, 0.1) 0%, transparent 70%);
    filter: blur(60px);
    z-index: -1;
    animation: glowMove 12s ease-in-out infinite alternate;
}

@keyframes glowMove {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 20px) scale(1.1); }
}

/* Responsive */
@media (max-width: 768px) {
    .chat-container {
        width: 95%;
        max-width: 500px;
    }
    
    .header {
        padding: 18px 15px;
        font-size: 1.3rem;
    }
    
    .messages {
        padding: 20px 15px;
        min-height: 350px;
        max-height: 450px;
    }
    
    .message {
        max-width: 85%;
        padding: 14px 18px;
    }
    
    .input-area {
        padding: 12px 15px;
    }
    
    .input-area input {
        padding: 14px 18px;
    }
    
    .input-area button {
        padding: 0 22px;
    }
    
    .home-button-wrapper {
        bottom: 20px;
        right: 20px;
    }
    
    .home-button {
        padding: 12px 18px;
        font-size: 13px;
    }
}

@media (max-width: 480px) {
    body {
        padding: 10px;
    }
    
    .chat-container {
        border-radius: 16px;
    }
    
    .header {
        padding: 16px 12px;
        font-size: 1.2rem;
    }
    
    .messages {
        padding: 15px 12px;
        min-height: 300px;
        max-height: 400px;
    }
    
    .message {
        max-width: 90%;
        padding: 12px 16px;
        font-size: 14px;
    }
    
    .input-area {
        padding: 10px 12px;
    }
    
    .input-area input {
        padding: 12px 16px;
        font-size: 14px;
    }
    
    .input-area button {
        padding: 0 18px;
        font-size: 14px;
    }
    
    .home-button-wrapper {
        bottom: 15px;
        right: 15px;
    }
}
</style>
</head>
<body>
<!-- Decorazioni autunnali -->
<div class="autumn-leaves">
    <div class="leaf"></div>
    <div class="leaf"></div>
    <div class="leaf"></div>
    <div class="leaf"></div>
    <div class="leaf"></div>
</div>

<!-- Glowing Effects -->
<div class="glow" style="top: 10%; left: 5%; animation-delay: 0s;"></div>
<div class="glow" style="bottom: 20%; right: 10%; background: radial-gradient(circle, rgba(244, 164, 96, 0.1) 0%, transparent 70%); animation-delay: 3s;"></div>
<div class="glow" style="top: 50%; left: 80%; background: radial-gradient(circle, rgba(205, 133, 63, 0.08) 0%, transparent 70%); animation-delay: 6s; width: 200px; height: 200px;"></div>

<div class="chat-container">
    <div class="header">
        <i class="fas fa-users"></i> Assistente HR Morato Pane
        <small>Intelligenza artificiale per la gestione delle risorse umane</small>
    </div>

    <select id="modelSelect" class="model-select" hidden>
        <option value="llama-3.2-3b-instruct">llama-3.2-3b-instruct</option>
        <option value="mediocredev_-_open-llama-3b-v2-chat">open-llama-3b-v2-chat</option>
    </select>

    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Scrivi la tua domanda..." />
        <button id="sendBtn">
            <span>Invia</span>
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const userInputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const modelSelect = document.getElementById('modelSelect');

sendBtn.addEventListener('click', handleSend);
userInputEl.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(); });

function handleSend() {
  const text = userInputEl.value.trim();
  if(!text) return;
  addMessage(text, 'user');
  userInputEl.value = '';
  generateReply(text);
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  
  // Aggiungi animazione
  setTimeout(() => {
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
  }, 10);
}

async function generateReply(question) {
  const selectedModel = modelSelect.value;
  try {
    const response = await fetch('/lm-completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: selectedModel, prompt: question })
    });
    const data = await response.json();
    addMessage(data.text || "Non ho ricevuto una risposta valida.", 'bot');
  } catch(err) {
    console.error(err);
    addMessage("Errore di connessione al server.", 'bot');
  }
}

// Focus automatico sull'input
userInputEl.focus();
</script>
</body>
</html>
